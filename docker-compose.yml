version: "3.9"

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://flik:flik@db:5432/flikdb
      - SYNC_DATABASE_URL=postgresql+psycopg2://flik:flik@db:5432/flikdb
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecretkey
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - BASE_URL=https://flik.app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    environment:
      - DATABASE_URL=postgresql+asyncpg://flik:flik@db:5432/flikdb
      - SYNC_DATABASE_URL=postgresql+psycopg2://flik:flik@db:5432/flikdb
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecretkey
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - BASE_URL=https://flik.app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
    command: rq worker --url redis://redis:6379/0 conversions emails

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=flik
      - POSTGRES_PASSWORD=flik
      - POSTGRES_DB=flikdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flik -d flikdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data: